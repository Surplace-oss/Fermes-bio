<style>
:root { --vert:#2d6a4f;--vert-clair:#52b788;--vert-pale:#d8f3dc;--terre:#8b5e3c;--creme:#faf8f3;--gris:#f0ede6;--gris-texte:#7a7067;--noir:#1a1a18;--blanc:#ffffff;--shadow:0 2px 16px rgba(0,0,0,0.08);--radius:14px; }

<script>
const map = L.map('map', { zoomControl: true }).setView([48.85, 2.35], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> | Données: <a href="https://www.agencebio.org">Agence Bio</a>',
  maxZoom: 18
}).addTo(map);

let allFarms = [], markers = [], searchCircle = null;

const productionEmojis = {
  'légumes':'🥕','legumes':'🥕','maraîchage':'🥕','maraichage':'🥕',
  'fruits':'🍎','arboriculture':'🍎','pommes':'🍎',
  'céréales':'🌾','cereales':'🌾','grandes cultures':'🌾','blé':'🌾',
  'bovins':'🐄','bovin':'🐄','lait':'🥛',
  'ovins':'🐑','ovin':'🐑','brebis':'🐑',
  'caprins':'🐐','caprin':'🐐',
  'porcins':'🐷','porcs':'🐷',
  'volailles':'🐔','poulets':'🐔',
  'apiculture':'🍯','miel':'🍯',
  'vigne':'🍷','viticulture':'🍷','vin':'🍷','raisin':'🍷',
  'fromage':'🧀','produits laitiers':'🧀',
  'oeufs':'🥚','œufs':'🥚',
  'plantes':'🌿','aromates':'🌿',
  'champignons':'🍄','pain':'🍞',
};

function getEmoji(productions) {
  if (!productions || productions.length === 0) return '🌿';
  const firstProd = (productions[0]?.nom || productions[0]?.libelle || '').toLowerCase();
  for (const [key, emoji] of Object.entries(productionEmojis)) {
    if (firstProd.includes(key)) return emoji;
  }
  return '🌱';
}

function getTagColor(i) { return ['tag-vert','tag-orange','tag-bleu','tag-rouge','tag-gris'][i % 5]; }
function getGradient(idx) { return ['linear-gradient(135deg,#d8f3dc,#95d5b2)','linear-gradient(135deg,#fde8c8,#f4a738)','linear-gradient(135deg,#fce4ec,#e57373)','linear-gradient(135deg,#e3f2fd,#64b5f6)','linear-gradient(135deg,#f3e5f5,#ce93d8)','linear-gradient(135deg,#e0f2f1,#4db6ac)'][idx % 6]; }

async function geocodeVille(ville) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(ville + ', France')}&format=json&limit=1`;
  const response = await fetch(url, { headers: { 'Accept-Language': 'fr' } });
  const data = await response.json();
  if (data.length === 0) throw new Error('Ville non trouvée');
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), nom: data[0].display_name };
}

// ─── DISTANCES ──────────────────────────────────────────────────────────────
function distanceKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ─── DÉPARTEMENTS ───────────────────────────────────────────────────────────
const DEPTS = [
  ['01',46.20,5.23],['02',49.55,3.62],['03',46.34,3.30],['04',44.08,6.24],['05',44.66,6.35],
  ['06',43.93,7.11],['07',44.72,4.53],['08',49.69,4.70],['09',42.96,1.60],['10',48.32,4.07],
  ['11',43.20,2.35],['12',44.35,2.57],['13',43.53,5.44],['14',49.09,-0.36],['15',45.05,2.63],
  ['16',45.70,0.16],['17',45.75,-0.67],['18',47.08,2.40],['19',45.37,1.88],['21',47.32,4.83],
  ['22',48.46,-2.76],['23',46.10,2.04],['24',45.15,0.72],['25',47.24,6.02],['26',44.72,5.05],
  ['27',49.07,1.17],['28',48.44,1.49],['29',48.24,-4.02],['30',44.01,4.17],['31',43.60,1.44],
  ['32',43.64,0.59],['33',44.84,-0.58],['34',43.61,3.88],['35',48.10,-1.68],['36',46.81,1.69],
  ['37',47.39,0.69],['38',45.19,5.72],['39',46.67,5.55],['40',43.89,-0.50],['41',47.59,1.34],
  ['42',45.52,4.07],['43',45.04,3.88],['44',47.37,-1.85],['45',47.91,2.16],['46',44.66,1.74],
  ['47',44.35,0.46],['48',44.50,3.50],['49',47.37,-0.55],['50',49.12,-1.33],['51',49.05,4.37],
  ['52',48.11,5.14],['53',48.07,-0.77],['54',48.69,6.18],['55',48.98,5.38],['56',47.85,-2.76],
  ['57',49.12,6.77],['58',47.06,3.66],['59',50.52,3.08],['60',49.41,2.34],['61',48.56,0.09],
  ['62',50.52,2.64],['63',45.77,3.08],['64',43.30,-0.37],['65',43.23,0.08],['66',42.70,2.55],
  ['67',48.58,7.75],['68',47.83,7.29],['69',45.76,4.84],['70',47.63,6.15],['71',46.67,4.51],
  ['72',47.99,0.19],['73',45.57,6.39],['74',46.01,6.27],['75',48.86,2.35],['76',49.44,1.10],
  ['77',48.73,2.98],['78',48.80,1.85],['79',46.65,-0.37],['80',49.92,2.30],['81',43.93,2.15],
  ['82',44.02,1.35],['83',43.46,6.26],['84',43.95,5.09],['85',46.67,-1.43],['86',46.58,0.34],
  ['87',45.84,1.26],['88',48.17,6.42],['89',47.80,3.57],['90',47.63,6.85],['91',48.63,2.25],
  ['92',48.85,2.25],['93',48.92,2.48],['94',48.79,2.47],['95',49.07,2.10]
];

// ─── LOAD FARMS — appel direct API Agence Bio côté client ───────────────────
// On contourne Vercel qui plafonnait à 20 items (timeout serverless).
// L'API opendata.agencebio.org est publique, CORS ouvert.
async function loadFarms(lat, lng, ville) {
  const list = document.getElementById('farms-list');
  list.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Recherche des fermes bio...</div></div>';
  document.getElementById('results-count').textContent = '';
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  try {
    let coords;
    if (lat && lng) {
      coords = { lat, lng, nom: ville || 'Paris' };
    } else {
      const villeInput = document.getElementById('search-input').value.trim();
      if (!villeInput) return;
      coords = await geocodeVille(villeInput);
      
    }

    const rayon = parseFloat(document.getElementById('rayon-select').value);
    map.setView([coords.lat, coords.lng], rayon <= 20 ? 12 : rayon <= 50 ? 10 : 8);

    if (searchCircle) { map.removeLayer(searchCircle); searchCircle = null; }
    searchCircle = L.circle([coords.lat, coords.lng], {
      radius: rayon * 1000, color: '#2d6a4f', fillColor: '#d8f3dc', fillOpacity: 0.1, weight: 2
    }).addTo(map);

    // Départements dans le rayon
    const deptsProches = DEPTS
      .filter(([, dLat, dLng]) => distanceKm(coords.lat, coords.lng, dLat, dLng) <= rayon + 30)
      .map(([code]) => code);
    const depts = deptsProches.join(',');

    // Pagination Agence Bio : nb = taille de page, debut = offset
    // On lance tous les départements en parallèle pour la 1ère page,
    // puis on récupère les pages suivantes si nécessaire.
    const NB = 100;
    const BASE = 'https://opendata.agencebio.org/api/gouv/operateurs/';

    async function fetchDept(dept) {
      const items = [];
      const seen = new Set();
      let firstRes;
      try {
        firstRes = await fetch(`${BASE}?departements=${dept}&nb=${NB}&debut=0`, { headers: { 'Accept': 'application/json' } });
      } catch(e) { console.warn('fetchDept error', dept, e); return items; }
      if (!firstRes.ok) return items;
      const firstData = await firstRes.json();
      const nbTotal = parseInt(firstData.nbTotal) || 0;
      (firstData.items || []).forEach(i => { if (!seen.has(i.id)) { seen.add(i.id); items.push(i); } });
      // Pages suivantes en parallèle
      const promises = [];
      for (let debut = NB; debut < nbTotal; debut += NB) {
        promises.push(fetch(`${BASE}?departements=${dept}&nb=${NB}&debut=${debut}`, { headers: { 'Accept': 'application/json' } }).then(r => r.ok ? r.json() : { items: [] }));
      }
      const pages = await Promise.all(promises);
      pages.forEach(d => (d.items || []).forEach(i => { if (!seen.has(i.id)) { seen.add(i.id); items.push(i); } }));
      return items;
    }

    // Tous les départements en parallèle
    const results = await Promise.all(deptsProches.map(fetchDept));
    const globalSeen = new Set();
    const allItems = [];
    results.flat().forEach(i => { if (!globalSeen.has(i.id)) { globalSeen.add(i.id); allItems.push(i); } });
    console.log('Total brut récupéré:', allItems.length, 'depuis', deptsProches.length, 'depts');

    // Filtre : venteAnnuaire.venteParticuliers === true + coordonnées GPS
    // Vérifié sur données réelles : exclut Franprix, Lidl, grossistes
    const filtered = allItems
      .filter(op => {
        const adr = op.adressesOperateurs?.[0];
        return op.venteAnnuaire?.venteParticuliers === true && adr?.lat && adr?.long;
      })
      .map(op => {
        const adr = op.adressesOperateurs[0];
        const dist = distanceKm(coords.lat, coords.lng, adr.lat, adr.long);
        return { ...op, _distance: Math.round(dist * 10) / 10 };
      })
      .filter(op => op._distance <= rayon)
      .sort((a, b) => a._distance - b._distance)
      .slice(0, 100);

    allFarms = filtered;

    if (allFarms.length === 0) {
      list.innerHTML = `<div class="loading-state">😕 Aucune ferme trouvée dans un rayon de ${rayon} km.<br><br>Essayez d'augmenter le rayon.</div>`;
      document.getElementById('results-count').textContent = '0 résultat';
      return;
    }
    renderFarms(allFarms);

  } catch (err) {
    console.warn('Erreur:', err);
    list.innerHTML = `<div class="loading-state" style="color:#c0392b;">❌ ${err.message || 'Erreur de chargement'}</div>`;
    document.getElementById('results-count').textContent = 'Erreur';
  }
}

function renderFarms(farms) {
  const list = document.getElementById('farms-list');
  list.innerHTML = '';
  document.getElementById('results-count').innerHTML = `<strong>${farms.length} fermes</strong> trouvées`;

  farms.forEach((f, idx) => {
    const adresse = f.adressesOperateurs?.[0] || {};
    const productions = f.productions || [];
    const emoji = getEmoji(productions);
    const nom = f.denominationCourante || f.raisonSociale || 'Ferme Bio';
    const activite = f.activites?.[0]?.nom || 'Producteur';
    const dist = f._distance ? `${f._distance} km` : '';

    const card = document.createElement('div');
    card.className = 'farm-card';
    card.id = `card-${f.id || idx}`;
    card.innerHTML = `
      <div class="card-thumb" style="background:${getGradient(idx)}">${emoji}</div>
      <div class="card-body">
        <div class="card-name" title="${nom}">${nom}</div>
        <div class="card-location">📍 ${adresse.ville || ''} ${adresse.codePostal || ''}</div>
        <div class="card-tags">
          ${productions.slice(0,3).map((p,i) => `<span class="tag ${getTagColor(i)}">${p.nom || p.libelle || ''}</span>`).join('')}
          ${productions.length > 3 ? `<span class="tag tag-gris">+${productions.length-3}</span>` : ''}
        </div>
        <div class="card-footer">
          ${dist ? `<span class="distance-badge">🚗 ${dist}</span>` : ''}
          <span class="tag tag-vert" style="font-size:11px;">${activite}</span>
        </div>
      </div>
    `;
    card.onclick = () => { openModal(f, emoji, idx); selectCard(f.id || idx); };
    list.appendChild(card);
    addMarker(f, emoji, idx);
  });
}

function addMarker(farm, emoji, idx) {
  const adresse = farm.adressesOperateurs?.[0] || {};
  const lat = adresse.lat, lng = adresse.long;
  if (!lat || !lng) return;
  const nom = farm.denominationCourante || farm.raisonSociale || 'Ferme Bio';
  const icon = L.divIcon({ className: '', html: `<div class="custom-marker">${emoji} ${nom.split(' ').slice(0,2).join(' ')}</div>`, iconAnchor: [40, 12] });
  const marker = L.marker([lat, lng], { icon }).addTo(map);
  marker.bindPopup(`
    <div style="min-width:200px;">
      <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:600;margin-bottom:4px;">${emoji} ${nom}</div>
      <div style="font-size:12px;color:#888;margin-bottom:6px;">📍 ${adresse.ville || ''} ${adresse.codePostal || ''}</div>
      ${farm._distance ? `<div style="font-size:12px;color:#2d6a4f;font-weight:600;margin-bottom:8px;">🚗 à ${farm._distance} km</div>` : ''}
      <button onclick="openModalById(${farm.id || idx})" style="width:100%;background:#2d6a4f;color:white;border:none;border-radius:8px;padding:8px;font-size:13px;cursor:pointer;">Voir la fiche →</button>
    </div>
  `, { maxWidth: 260 });
  marker.on('click', () => selectCard(farm.id || idx));
  markers.push(marker);
  farm._markerIdx = markers.length - 1;
  farm._idx = idx;
  farm._emoji = emoji;
}

function selectCard(id) {
  document.querySelectorAll('.farm-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById(`card-${id}`);
  if (card) { card.classList.add('selected'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function openModalById(idOrIdx) {
  const f = allFarms.find(x => x.id === idOrIdx) || allFarms[idOrIdx];
  if (f) openModal(f, f._emoji || '🌿', f._idx || 0);
}

function openModal(f, emoji, idx) {
  const nom = f.denominationCourante || f.raisonSociale || 'Ferme Bio';
  const adresse = f.adressesOperateurs?.[0] || {};
  const certif = f.certificats?.[0] || {};
  document.getElementById('modal-emoji').textContent = emoji;
  document.getElementById('modal-header').style.background = getGradient(idx);
  document.getElementById('modal-title').textContent = nom;
  document.getElementById('modal-meta').innerHTML = `
    <span>📍 ${adresse.lieu || ''}, ${adresse.codePostal || ''} ${adresse.ville || ''}</span>
    ${f._distance ? `<span>🚗 à ${f._distance} km</span>` : ''}
    <span>🆔 N° BIO: ${f.numeroBio || '—'}</span>
  `;
  const prods = f.productions || [];
  document.getElementById('modal-products').innerHTML = prods.length
    ? prods.map(p => `<span class="tag tag-vert" style="font-size:13px;padding:6px 12px;">${getEmoji([p])} ${p.nom || p.libelle || ''}</span>`).join('')
    : '<span style="color:#888;font-size:13px;">Non renseigné</span>';
  const tel = f.telephoneNational || f.telephone || '';
  const contact = [
    tel ? `📞 ${tel}` : '',
    f.email ? `✉️ ${f.email}` : '',
    (f.siteWebs||[]).filter(s => s.url).length > 0 ? `🌐 <a href="${f.siteWebs[0].url}" target="_blank">${f.siteWebs[0].url}</a>` : '',
  ].filter(Boolean);
  document.getElementById('modal-contact').innerHTML = contact.length
    ? contact.map(c => `<div style="font-size:13px;margin-bottom:4px;">${c}</div>`).join('')
    : '<span style="font-size:13px;color:#888;">Coordonnées non renseignées</span>';
  document.getElementById('modal-certif').innerHTML = `<div style="font-size:13px;"><span style="background:#e8f5e9;color:#2d6a4f;padding:3px 10px;border-radius:10px;font-weight:500;">🏅 Certifié Agriculture Biologique</span>${certif.organisme ? `<span style="margin-left:8px;color:#888;">${certif.organisme}</span>` : ''}</div>`;
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(nom + ' ' + (adresse.ville || ''))}`;
  document.getElementById('modal-maps-btn').onclick = () => window.open(mapsUrl, '_blank');
  const certifUrl = certif.url || `https://annuaire.agencebio.org/fiche/${f.numeroBio}`;
  document.getElementById('modal-certif-btn').onclick = () => window.open(certifUrl, '_blank');
  document.getElementById('modal-overlay').classList.add('open');
  selectCard(f.id || idx);
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('open'); }
function toggleFilter(btn) { btn.classList.toggle('active'); }

function sortFarms(value) {
  if (value === 'distance') allFarms.sort((a,b) => (a._distance||999) - (b._distance||999));
  if (value === 'nom') allFarms.sort((a,b) => (a.denominationCourante||a.raisonSociale||'').localeCompare(b.denominationCourante||b.raisonSociale||''));
  markers.forEach(m => map.removeLayer(m)); markers = [];
  renderFarms(allFarms);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadFarms(); });

// Chargement automatique Paris 100km
document.getElementById('rayon-select').value = '100';
loadFarms(48.8566, 2.3522, 'Paris');
</script>
